# Netlify Configuration
# Note: This app cannot run on Netlify as it's a Python/Streamlit application.
# Netlify is for static sites only.

# This file provides a redirect to inform users about proper deployment

[build]
  # No build step required — this is a static redirect-only site.
  # The command below overrides any build command set in the Netlify UI.
  command = "echo 'No build required: static redirect only'"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/deployment-info.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
