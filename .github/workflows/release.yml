name: Build & Release Downloadable App

on:
  push:
    tags:
      - 'v*'   # trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

# Minimal default permissions for all jobs
permissions:
  contents: read

jobs:
  # ── Build platform packages ───────────────────────────────────────────────
  build:
    name: Build ${{ matrix.platform }} package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            archive_ext: tar.gz
          - os: macos-latest
            platform: mac
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows
            archive_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Verify the app at least imports without error ──────────────────────
      - name: Smoke-test app imports
        run: python -c "import app; print('Import OK')"
        env:
          # Streamlit reads this env var to suppress the welcome message
          STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"

      # ── Package for Linux / Mac ────────────────────────────────────────────
      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x run.sh
          PKG_NAME="HowToWorkACat-${{ github.ref_name || inputs.tag }}-${{ matrix.platform }}"
          mkdir -p "dist/$PKG_NAME"
          cp -r app.py database.py models.py content_loader.py requirements.txt run.sh pages "dist/$PKG_NAME/"
          # Include Streamlit config if present
          [ -d .streamlit ] && cp -r .streamlit "dist/$PKG_NAME/" || true
          cd dist
          tar -czf "${PKG_NAME}.tar.gz" "$PKG_NAME"
          echo "ASSET_PATH=dist/${PKG_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${PKG_NAME}.tar.gz" >> $GITHUB_ENV

      # ── Package for Windows ────────────────────────────────────────────────
      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $PKG_NAME = "HowToWorkACat-${{ github.ref_name || inputs.tag }}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path "dist/$PKG_NAME"
          Copy-Item app.py, database.py, models.py, content_loader.py, requirements.txt, run.bat "dist/$PKG_NAME/"
          Copy-Item pages -Destination "dist/$PKG_NAME/pages" -Recurse
          if (Test-Path .streamlit) { Copy-Item .streamlit -Destination "dist/$PKG_NAME/.streamlit" -Recurse }
          Compress-Archive -Path "dist/$PKG_NAME" -DestinationPath "dist/$PKG_NAME.zip"
          echo "ASSET_PATH=dist/$PKG_NAME.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "ASSET_NAME=$PKG_NAME.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-package
          path: ${{ env.ASSET_PATH }}
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: dist/

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: How To Work A Cat ${{ steps.tag.outputs.tag }}
          body: |
            ## 🐱 How To Work A Cat — ${{ steps.tag.outputs.tag }}

            An offline-first kitten care guide you can run on your own computer.

            ### 📥 Download

            | Platform | File | Instructions |
            |----------|------|--------------|
            | 🪟 Windows | `…-windows.zip` | Download, unzip, double-click `run.bat` |
            | 🍎 Mac     | `…-mac.tar.gz`  | Download, extract, run `bash run.sh` in Terminal |
            | 🐧 Linux   | `…-linux.tar.gz`| Download, extract, run `bash run.sh` in Terminal |

            ### 📋 Requirements

            - **Python 3.8 or newer** must be installed ([download here](https://www.python.org/downloads/))
            - The launcher scripts automatically create a virtual environment and install all other dependencies
            - No internet required after the first launch

            ### 🚀 Quick Start

            1. Download the package for your platform below
            2. Unzip / extract the archive
            3. Run the launcher script (`run.bat` on Windows, `run.sh` on Mac/Linux)
            4. The app opens in your browser at **http://localhost:8501**
          files: dist/**/*
          draft: false
          prerelease: false
